<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruiter Notifications</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/app-shell.css" />
  <link rel="stylesheet" href="recruiter_notifications_page.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="../shared/app-shell.js" defer></script>
  <script type="module" src="recruiter_notifications_page.js"></script>
</head>
<body data-shell-role="recruiter" data-shell-active="notifications" data-shell-base="..">
  <main class="container">
    <header class="page-header">
      <div>
        <h1>Notifications</h1>
        <p id="notificationsMeta" class="page-meta">Loading your recruiter updates...</p>
      </div>
    </header>

    <section id="notificationList" class="notification-list" aria-label="Recruiter notifications">
      <article class="notification-card">
        <h2>Loading notifications</h2>
        <p>Your recruiter updates are loading.</p>
      </article>
    </section>
  </main>
</body>
</html>
