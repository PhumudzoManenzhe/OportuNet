<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic page metadata and the stylesheet for the login form. -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Form in HTML and CSS | CodingNepal</title>
  <link rel="stylesheet" href="logIn_style.css" />
</head>
<body>
  <!-- Main login container that centers the authentication form. -->
  <main class="login_form">
    <!-- Form where existing users enter credentials to access the platform. -->
    <form action="#">
      <h3>Log in with</h3>
      <!-- Social login area for signing in with a connected Google account. -->
      <section class="login_option">
        <!-- Google authentication button styled like a provider option. -->
        <section class="option">
          <a href="#">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" />
            <span>Google</span>
          </a>
        </section>
      </section>
      <!-- Separator that visually splits social login from email login. -->
      <p class="separator">
        <span>or</span>
      </p>
      <!-- Email field for entering the account email address. -->
      <section class="input_box">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter email address" required />
      </section>
      <!-- Password field with a forgot-password link and visibility toggle. -->
      <section class="input_box password_box">
        <header class="password_title">
          <label for="password">Password</label>
          <a id="forgotPassword" href="#">Forgot Password?</a>
        </header>
        <!-- Wrapper that keeps the password input and toggle label together. -->
        <section class="password_wrapper">
          <input type="password" id="password" placeholder="Enter your password" required />
          <span id="togglePassword" class="toggle-password">Show</span>
        </section>
      </section>
      <!-- Primary action button that submits the login form. -->
      <button type="submit">Log In</button>
      <!-- Sign-up link for users who still need to create an account. -->
      <p class="sign_up">Don't have an account? <a href="signUp.html">Sign up</a></p>
    </form>
  </main>
<!-- Firebase libraries required for authentication and future Firestore access. -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<!-- Shared authentication script that handles login behavior on this page. -->
<script src="signup_logIn.js"></script>
</body>
</html>
