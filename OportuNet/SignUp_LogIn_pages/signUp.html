<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page metadata and the stylesheet for the sign-up screen. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="signUp_style.css">
</head>
<body>

<!-- Main sign-up card that centers the registration form on the page. -->
<main class="signup-container">
    <h2>Create Account</h2>

    <!-- Account creation form that collects the user's basic credentials. -->
    <form id="signupForm">
        <!-- Full name field for identifying the new user. -->
        <section class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </section>

        <!-- Email field used as the account login identifier. -->
        <section class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </section>

        <!-- Password field where the user creates their secure password. -->
        <section class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </section>

        <!-- Confirmation field to help verify that the password was typed correctly. -->
        <section class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
        </section>

        <!-- Primary action button that submits the sign-up form. -->
        <button type="submit" class="signup-btn">Sign Up</button>

        <!-- Divider that separates direct sign-up from social sign-in. -->
        <p class="divider">
            <span>OR</span>
        </p>

        <!-- Alternative Google authentication button for quicker registration. -->
        <button type="button" class="google-btn">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
            Sign up with Google
        </button>

        <!-- Link for users who already have an account and need the login page. -->
        <p class="login-link">
            Already have an account? <a href="logIn.html">Login</a>
        </p>
    </form>
</main>
<!-- Firebase libraries that support authentication on this page. -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<!-- Shared authentication script for sign-up, login, and password reset logic. -->
<script src="signup_logIn.js"></script>

</html>
