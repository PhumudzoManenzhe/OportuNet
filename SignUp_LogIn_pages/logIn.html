<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In | OportuNet</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="stylesheet" href="./logIn_style.css" />
</head>
<body>

  <main class="login_form">
    <form action="#">
      <h3>Log in with</h3>

      <section class="login_option">
        <article class="option">
          <a href="#">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" />
            <span>Google</span>
          </a>
        </article>
      </section>

      <p class="separator">
        <span>or</span>
      </p>

      <section class="input_box">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter email address" required />
      </section>

      <section class="input_box password_box">
        <header class="password_title">
          <label for="password">Password</label>
          <a id="forgotPassword" href="#">Forgot Password?</a>
        </header>

        <section class="password_wrapper">
          <input type="password" id="password" placeholder="Enter your password" required />
          <button type="button" id="togglePassword" class="toggle-password" data-target="password">Show</button>
        </section>
      </section>

      <button type="submit">Log In</button>

      <p class="sign_up">
        Don't have an account? <a href="./index.html">Sign up</a>
      </p>
    </form>
  </main>

  <script type = "module" src="signup_logIn.js"></script>

</body>
</html>
