<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
    <link rel="stylesheet" href="./signUp_style.css">
</head>
<body>

<main class="signup-container">
    <h2>Create Account</h2>

    <form id="signupForm">

        <section class="input-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="Enter your name" autocomplete="name" required>
        </section>

        <section class="input-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" name="email" placeholder="Enter your email" autocomplete="email" required>
        </section>

        <section class="input-group">
            <label for="password">Password</label>
            <section class="password_wrapper">
                <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="new-password" required>
                <button type="button" class="toggle-password" data-target="password">Show</button>
            </section>
        </section>

        <section class="input-group">
            <label for="confirmPassword">Confirm Password</label>
            <section class="password_wrapper">
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" autocomplete="new-password" required>
                <button type="button" class="toggle-password" data-target="confirmPassword">Show</button>
            </section>
        </section>

        <button type="submit" class="signup-btn">Sign Up</button>

        <section class="divider">
            <span>OR</span>
        </section>

        <button type="button" class="google-btn">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
            Sign up with Google
        </button>

        <p class="login-link">
            Already have an account? <a href="./logIn.html">Login</a>
        </p>

    </form>
</main>

<script type = "module" src="/SignUp_LogIn_pages/signup_logIn.js"></script>

</body>
</html>
