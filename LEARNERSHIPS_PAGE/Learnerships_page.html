<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learnerships</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/app-shell.css" />
  <link rel="stylesheet" href="../shared/opportunity-board.css" />
  <link rel="stylesheet" href="Learnerships_page.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="../shared/app-shell.js" defer></script>
  <script type="module" src="script.js"></script>
</head>
<body data-shell-role="applicant" data-shell-active="learnerships" data-shell-base="..">
  <a class="skip-link" href="#Learnerships-heading">Skip to learnerships</a>
  <main class="page-content">
    <header class="page-header">
      <section class="heading-text">
        <p class="hero-eyebrow">Opportunity board</p>
        <h1>Available Learnerships</h1>
        <p>Find structured learning opportunities and compare the details before applying.</p>
      </section>
      <aside class="hero-summary" aria-label="Learnership page status">
        <span class="hero-summary-icon" aria-hidden="true"><i class="fa-solid fa-graduation-cap"></i></span>
        <div>
          <span>Category</span>
          <strong>Learnerships</strong>
        </div>
      </aside>
    </header>

    <section class="search-area" aria-label="Search Learnerships">
      <span class="search-icon" aria-hidden="true"><i class="fa-solid fa-magnifying-glass"></i></span>
      <label for="search-Learnerships" class="visually-hidden">Search Learnerships</label>
      <input
        type="search"
        id="search-Learnerships"
        placeholder="Search Learnerships by title, company, or location"
      />
      <button type="button"><i class="fa-solid fa-arrow-right" aria-hidden="true"></i><span>Search</span></button>
    </section>

    <section class="Learnerships-section" aria-labelledby="Learnerships-heading">
      <header class="section-header">
        <div>
          <p class="section-kicker">Results</p>
          <h2 id="Learnerships-heading">Available Learnerships</h2>
        </div>
      </header>

      <section class="Learnerships-list" id="learnerships-list" aria-label="Learnerships results">
        <p class="status-message">Loading learnerships...</p>
      </section>
    </section>
  </main>

</body>
</html>
