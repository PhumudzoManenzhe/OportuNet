<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Applications</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/app-shell.css" />
  <link rel="stylesheet" href="applications.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="../shared/app-shell.js" defer></script>
  <script type="module" src="applications.js"></script>
</head>
<body data-shell-role="applicant" data-shell-active="applications" data-shell-base="..">
  <a class="skip-link" href="#applicationsHeading">Skip to applications</a>
  <main class="page-shell">
    <header class="applications-hero">
      <div>
        <p class="hero-eyebrow">Application tracker</p>
        <h1>My Applications</h1>
        <p>Review every submission, filter status updates, and keep your next step easy to scan.</p>
      </div>
      <aside class="hero-summary" aria-label="Application page status">
        <span class="hero-summary-icon" aria-hidden="true"><i class="fa-solid fa-file-lines"></i></span>
        <div>
          <span>Status</span>
          <strong>Live tracker</strong>
        </div>
      </aside>
    </header>

    <section class="summary-grid" aria-label="Application summary">
      <article class="summary-card" data-tone="pending">
        <span class="summary-icon" aria-hidden="true"><i class="fa-regular fa-clock"></i></span>
        <span class="summary-label">Pending</span>
        <strong id="pendingCount" class="summary-value">0</strong>
      </article>
      <article class="summary-card" data-tone="wishlisted">
        <span class="summary-icon" aria-hidden="true"><i class="fa-solid fa-star"></i></span>
        <span class="summary-label">Wish listed</span>
        <strong id="wishListedCount" class="summary-value">0</strong>
      </article>
      <article class="summary-card" data-tone="accepted">
        <span class="summary-icon" aria-hidden="true"><i class="fa-solid fa-circle-check"></i></span>
        <span class="summary-label">Accepted</span>
        <strong id="acceptedCount" class="summary-value">0</strong>
      </article>
      <article class="summary-card" data-tone="rejected">
        <span class="summary-icon" aria-hidden="true"><i class="fa-solid fa-circle-xmark"></i></span>
        <span class="summary-label">Rejected</span>
        <strong id="rejectedCount" class="summary-value">0</strong>
      </article>
    </section>

    <section class="page-toolbar" aria-label="Application filters">
      <div class="filter-group">
        <button type="button" class="filter-btn active" data-filter="all">All</button>
        <button type="button" class="filter-btn" data-filter="pending">Pending</button>
        <button type="button" class="filter-btn" data-filter="wishlisted">Wish listed</button>
        <button type="button" class="filter-btn" data-filter="accepted">Accepted</button>
        <button type="button" class="filter-btn" data-filter="rejected">Rejected</button>
        <button type="button" class="filter-btn" data-filter="other">Other updates</button>
      </div>
    </section>

    <section class="applications-section" aria-labelledby="applicationsHeading">
      <header class="section-heading">
        <h2 id="applicationsHeading">Submitted applications</h2>
        <p id="applicationsMeta" class="section-meta">Loading your applications...</p>
      </header>
      <section id="applicationsList" class="applications-grid" aria-label="Application list">
        <p class="empty-state">Loading your applications...</p>
      </section>
    </section>
  </main>
</body>
</html>
